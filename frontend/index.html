<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6bff" />
  <title>장보기 친구 · 오늘의 마트 가이드</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="장보기 친구 · 오늘의 마트 가이드" />
  <meta property="og:description" content="오늘 평소보다 싸진 식재료를 알려드려요. 1인 가구·초보 요리 친화 마트 가이드." />
  <meta property="og:image" content="https://today-baguni.onrender.com/static/icons/icon-512.png?v=26" />
  <meta property="og:url" content="https://today-baguni.onrender.com" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="장보기 친구" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png?v=26" />
  <link rel="stylesheet" href="/static/style.css?v=27" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header__title">장보기 친구<span class="header__date" id="today-date">불러오는 중…</span></h1>
      <span class="badge badge--sample" id="sample-badge" hidden>샘플 데이터 (KAMIS 키 연결 전)</span>
      <p class="header__sub">오늘의 마트 가이드</p>
    </header>

    <div class="recmenu" id="recmenu" hidden>
      <p class="recmenu__title">오늘의 추천 메뉴</p>
      <p class="recmenu__sub">추천 3가지 + 내가 담은 재료 (눌러서 빼고 더하기)</p>
      <p class="recmenu__legend">
        <span class="recmenu__legend-item"><span class="recmenu__dot recmenu__dot--rec"></span>추천</span>
        <span class="recmenu__legend-item"><span class="recmenu__dot recmenu__dot--pick"></span>내가 담음</span>
      </p>
      <div class="recmenu__chips" id="recmenu-chips"></div>
      <button class="recmenu__go" id="recmenu-go" type="button">선택한 재료로 레시피 보기</button>
      <button class="recmenu__share" id="recmenu-share" type="button">🛒 오늘 저렴한 재료 친구에게 공유</button>
    </div>

    <div class="funbar" id="funbar" hidden>
      <p class="funbar__tip" id="daily-tip">💡 불러오는 중…</p>
      <button class="funbar__roll" id="roll-btn" type="button">🎲 어떤 재료를 써볼까?</button>
    </div>

    <main class="feed" id="feed" aria-live="polite">
      <div class="skel-list" id="loading-state" aria-busy="true" aria-label="오늘 장보기 불러오는 중">
        <div class="skel-card">
          <div class="skel-col">
            <div class="skeleton skel-line skel-line--title"></div>
            <div class="skeleton skel-line skel-line--price"></div>
            <div class="skeleton skel-line skel-line--tag"></div>
          </div>
          <div class="skeleton skel-pill"></div>
        </div>
        <div class="skel-card">
          <div class="skel-col">
            <div class="skeleton skel-line skel-line--title"></div>
            <div class="skeleton skel-line skel-line--price"></div>
            <div class="skeleton skel-line skel-line--tag"></div>
          </div>
          <div class="skeleton skel-pill"></div>
        </div>
        <div class="skel-card">
          <div class="skel-col">
            <div class="skeleton skel-line skel-line--title"></div>
            <div class="skeleton skel-line skel-line--price"></div>
            <div class="skeleton skel-line skel-line--tag"></div>
          </div>
          <div class="skeleton skel-pill"></div>
        </div>
      </div>

      <div class="state state--error" id="error-state" hidden>
        <p class="state__title">불러오지 못했어요</p>
        <p class="state__desc">잠시 후 다시 시도해 주세요.</p>
        <button class="retry-btn" id="retry-btn" type="button">다시 시도</button>
      </div>

      <div class="searchbar" id="searchbar" hidden>
        <span class="searchbar__icon" aria-hidden="true">🔍</span>
        <input class="searchbar__input" id="search-input" type="search" inputmode="search" enterkeyhint="search" placeholder="재료 검색 (예: 양파, 계란)" aria-label="재료 검색" autocomplete="off" />
        <button class="searchbar__clear" id="search-clear" type="button" aria-label="검색 지우기" hidden>✕</button>
      </div>

      <div class="filters" id="filters" role="tablist" aria-label="분류 필터" hidden>
        <button class="chip is-active" type="button" data-group="전체" aria-pressed="true">전체</button>
        <button class="chip" type="button" data-group="채소" aria-pressed="false">채소</button>
        <button class="chip" type="button" data-group="고기·계란" aria-pressed="false">고기·계란</button>
        <button class="chip" type="button" data-group="수산물" aria-pressed="false">수산물</button>
        <button class="chip" type="button" data-group="과일" aria-pressed="false">과일</button>
        <button class="chip" type="button" data-group="곡물·기타" aria-pressed="false">곡물·기타</button>
        <button class="chip" type="button" data-group="음료" aria-pressed="false">음료</button>
      </div>

      <div class="sorts" id="sorts" role="group" aria-label="정렬" hidden>
        <button class="sortbtn is-active" type="button" data-sort="discount" aria-pressed="true">평소보다 저렴해진순</button>
        <button class="sortbtn" type="button" data-sort="price" aria-pressed="false">가격 낮은순</button>
        <button class="sortbtn" type="button" data-sort="name" aria-pressed="false">이름순</button>
        <button class="sortbtn" type="button" data-sort="score" aria-pressed="false">추천순</button>
      </div>

      <ul class="cards" id="cards" hidden></ul>

      <p class="feed-empty" id="feed-empty" hidden>이 분류는 오늘 추천이 없어요</p>
    </main>

    <footer class="footer">
      <p>가격은 KAMIS 전국 평균 소매 기준 · 레시피는 외부 검색 결과로 연결됩니다</p>
    </footer>
  </div>

  <div class="actionbar" id="actionbar" hidden>
    <span class="actionbar__count" id="actionbar-count">재료 0개 선택</span>
    <button class="actionbar__clear" id="actionbar-clear" type="button">비우기</button>
    <button class="actionbar__go" id="actionbar-go" type="button">이 재료로 레시피 찾기</button>
  </div>

  <div class="sheet" id="combo-sheet" hidden>
    <div class="sheet__backdrop" id="combo-backdrop"></div>
    <div class="sheet__panel" role="dialog" aria-modal="true" aria-label="선택한 재료 레시피">
      <div class="sheet__bar">
        <p class="sheet__title">선택한 재료로 레시피</p>
        <button class="sheet__close" id="combo-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="sheet__body" id="combo-body"></div>
    </div>
  </div>

  <div class="roll-pop" id="roll-pop" hidden>
    <div class="roll-pop__backdrop" id="roll-backdrop"></div>
    <div class="roll-pop__panel" role="dialog" aria-modal="true" aria-label="어떤 재료를 써볼까">
      <button class="roll-pop__close" id="roll-close" type="button" aria-label="닫기">✕</button>
      <p class="roll-pop__q">오늘은…</p>
      <p class="roll-pop__pick" id="roll-pick">?</p>
      <p class="roll-pop__sub">어때요?</p>
      <div class="roll-pop__actions">
        <button class="roll-pop__again" id="roll-again" type="button">✋ 그만</button>
        <button class="roll-pop__recipe" id="roll-recipe" type="button">레시피 보기</button>
      </div>
    </div>
  </div>

  <div class="exit-toast" id="exit-toast" role="status" aria-live="polite" hidden>한 번 더 뒤로 누르시면 종료됩니다</div>

  <script src="/static/app.js?v=27"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(e){console.warn('SW reg failed',e)});});}</script>
</body>
</html>
